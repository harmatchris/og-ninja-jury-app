<style>
:root{
  --bg:#0B0B14;--card:#141420;--card2:#1A1A2C;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --cor:#FF5E3A;--cor2:#FF9040;
  --text:#fff;--muted:rgba(255,255,255,0.38);--dim:rgba(255,255,255,0.16);
  --green:#34C759;--red:#FF3B30;--gold:#FFD60A;--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;}
#root{min-height:100%;display:flex;flex-direction:column;}
button,input,select,textarea{font-family:inherit;}
input,textarea,select{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:12px;color:var(--text);padding:12px 14px;
  font-size:14px;outline:none;width:100%;transition:border-color .2s,background .2s;
}
input:focus,textarea:focus,select:focus{border-color:rgba(255,94,58,.5);background:rgba(255,94,58,.04);}
input::placeholder{color:var(--dim);}
select option{background:#1A1A2C;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes cpFlash{0%{transform:scale(1)}30%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .28s cubic-bezier(.16,1,.3,1) both;}
.scale-in{animation:scaleIn .22s cubic-bezier(.16,1,.3,1) both;}
/* sh-card: the Superhuman card primitive */
.sh-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:0 4px 24px rgba(0,0,0,.28);
  transition:background .18s,border-color .18s;
}
.sh-card:hover{background:#181828;border-color:var(--border2);}
/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;border:none;cursor:pointer;
  font-family:inherit;font-weight:700;border-radius:12px;
  transition:transform .14s cubic-bezier(.34,1.56,.64,1),box-shadow .14s,opacity .14s;}
.btn:active{transform:scale(.96)!important;}
.btn:disabled{opacity:.38;pointer-events:none;}
.btn-coral{background:linear-gradient(135deg,var(--cor),var(--cor2));color:#fff;box-shadow:0 6px 22px rgba(255,94,58,.3);}
.btn-coral:hover{box-shadow:0 8px 30px rgba(255,94,58,.46);}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:rgba(255,255,255,.07);color:var(--text);border-color:var(--border2);}
.btn-fall{background:transparent;color:rgba(255,120,100,.42);border:1px solid rgba(255,94,58,.14);}
.btn-fall:hover{background:rgba(255,94,58,.07);color:var(--cor);border-color:rgba(255,94,58,.35);}
/* topbar */
.topbar{position:sticky;top:0;z-index:50;background:rgba(11,11,20,.95);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);padding:0 16px;height:56px;
  display:flex;align-items:center;gap:10px;}
.topbar-logo{width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--cor),var(--cor2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(255,94,58,.28);flex-shrink:0;}
.topbar-title{font-size:14px;font-weight:700;letter-spacing:-.2px;flex:1;}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:-1px;}
/* live badge */
.live-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;
  letter-spacing:.06em;background:rgba(255,94,58,.14);color:var(--cor);
  border:1px solid rgba(255,94,58,.28);display:flex;align-items:center;gap:5px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--cor);
  box-shadow:0 0 6px var(--cor);animation:pulse 1.6s infinite;}
/* chip */
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);
  cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.chip:hover{background:rgba(255,255,255,.07);color:var(--text);}
.chip.active{background:rgba(255,94,58,.14);border-color:rgba(255,94,58,.4);color:var(--cor);}
/* cp pills — obstacle name pills (Superhuman style) */
.cp-pill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;transition:all .22s;}
.cp-pill.done{background:rgba(255,94,58,.12);border:1px solid rgba(255,94,58,.28);color:rgba(255,94,58,.85);}
.cp-pill.cur{background:rgba(255,94,58,.22);border:1px solid rgba(255,94,58,.6);color:var(--cor);}
.cp-pill.next{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);}
.cp-pill.future{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.18);}
/* THE big checkpoint button */
.big-cp-btn{width:100%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--cor),var(--cor2));color:#fff;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  font-family:'Inter',sans-serif;font-size:22px;font-weight:900;letter-spacing:.04em;
  box-shadow:0 10px 38px rgba(255,94,58,.42);
  transition:transform .14s cubic-bezier(.34,1.56,.64,1),box-shadow .14s;}
.big-cp-btn:active{transform:scale(.96)!important;box-shadow:0 4px 14px rgba(255,94,58,.22)!important;}
.big-cp-btn.flash{animation:cpFlash .32s ease;}
/* gradient mono timer */
.timer-grad{font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:-2px;line-height:1;
  background:linear-gradient(135deg,#fff 0%,var(--cor) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
/* label */
.lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.section{padding:18px 16px;display:flex;flex-direction:column;gap:12px;}
.sep{height:1px;background:var(--border);}
/* modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.74);
  backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:520px;
  padding:24px 20px 38px;animation:slideUp .28s cubic-bezier(.16,1,.3,1);}
/* tabbar */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(11,11,20,.97);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;padding:8px 0 max(10px,env(safe-area-inset-bottom));}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:5px 0;cursor:pointer;color:var(--dim);transition:color .18s;border:none;background:transparent;}
.tab-item.active{color:var(--cor);}
.tab-item span{font-size:10px;font-weight:600;letter-spacing:.04em;}
/* drag & drop */
.drag-handle{cursor:grab;color:var(--dim);padding:4px 5px;border-radius:6px;
  display:flex;align-items:center;transition:color .15s;}
.drag-handle:hover{color:var(--muted);}
.drag-over{border-color:rgba(255,94,58,.5)!important;background:rgba(255,94,58,.05)!important;}
.dragging{opacity:.4;}
/* winner card */
.winner-card{border-radius:18px;padding:20px;
  background:linear-gradient(135deg,rgba(255,94,58,.18),rgba(255,94,58,.06));
  border:1px solid rgba(255,94,58,.28);box-shadow:0 6px 28px rgba(255,94,58,.1);
  position:relative;overflow:hidden;}
.winner-card::before{content:'';position:absolute;top:-28px;right:-22px;
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,94,58,.2),transparent);}
/* display */
.display-root{background:#000;min-height:100vh;color:#fff;font-family:'Inter',sans-serif;}
/* regelwerk */
.rw-chapter{border-bottom:1px solid var(--border);}
.rw-chapter summary{padding:15px 16px;cursor:pointer;font-weight:700;font-size:14px;
  list-style:none;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.rw-chapter[open] summary::after{content:'▲';font-size:9px;color:var(--muted);}
.rw-chapter summary::after{content:'▼';font-size:9px;color:var(--dim);}
.rw-body{padding:0 16px 16px;font-size:13px;color:var(--muted);line-height:1.75;}
.rw-body p{margin-bottom:8px;}
.rw-body strong{color:rgba(255,255,255,.7);}
</style>
</head>

  {nr:'1',title:'Allgemeines & Wettkampf',color:'#FF5E3A',content:`<p><strong>1.1 Veranstalter</strong> – Verantwortlich für sichere Durchführung, Hindernisse und Regelwerk-Einhaltung.</p><p><strong>1.2 Jury</strong> – Jede Station mind. eine Jury-Person für Zeitnahme und Checkpoint-Beurteilung.</p><p><strong>1.3 Protest</strong> – Innerhalb 15 Min. schriftlich. Gebühr CHF 20, bei berechtigtem Protest zurückerstattet.</p><p><strong>1.4 Ausrüstung</strong> – Geschlossene Schuhe Pflicht. Chalk erlaubt.</p>`},

  {nr:'5',title:'Kategorien & LK',color:'#FF9F0A',content:`<p>• <strong>Bambinis</strong> 5–7 J. (gemischt) • <strong>Kids</strong> 8–11 (M/W) × LK1/LK2 • <strong>Teens</strong> 12–15 (M/W) × LK1/LK2 • <strong>Adults</strong> 16–39 (M/W) × LK1/LK2 • <strong>Masters</strong> 40+ (M/W)</p><p><strong>LK1</strong> – Erfahrene Athleten, digitale Zeitmessung Pflicht. <strong>LK2</strong> – Einsteiger. <strong>Aufstieg</strong> nach 3 Podiumsplätzen in LK2 verpflichtend.</p>`},

// ── HOOKS ─────────────────────────────────────────────────
const useFbVal=path=>{
  const [val,setVal]=useState(undefined);
  useEffect(()=>{if(!path)return;const ref=db.ref(path);const fn=s=>setVal(s.val());ref.on('value',fn);return()=>ref.off('value',fn);},[path]);
  return val;
};
const useTimer=(running,startPerf)=>{
  const [el,setEl]=useState(0);const raf=useRef();
  useEffect(()=>{if(!running){cancelAnimationFrame(raf.current);return;}const tick=()=>{setEl(performance.now()-startPerf);raf.current=requestAnimationFrame(tick);};raf.current=requestAnimationFrame(tick);return()=>cancelAnimationFrame(raf.current);},[running,startPerf]);
  return el;
};

const QRCodeComp=({url,size=150})=>{
  const ref=useRef();
  useEffect(()=>{if(!ref.current||!url||!window.QRCode)return;ref.current.innerHTML='';try{new window.QRCode(ref.current,{text:url,width:size,height:size,colorDark:'#000',colorLight:'#fff'});}catch{ref.current.innerHTML=`<span style="font-size:10px;color:#666">${url}</span>`;};},[url,size]);
  return <div style={{background:'#fff',padding:10,borderRadius:10,display:'inline-block'}} ref={ref}/>;
};

// ── DRAG & DROP REORDERABLE LIST ──────────────────────────
const DragList=({items,onReorder,renderItem,keyFn})=>{
  const dragIdx=useRef(null);
  const [overIdx,setOverIdx]=useState(null);
  const handleDragStart=(i,e)=>{dragIdx.current=i;e.dataTransfer.effectAllowed='move';};
  const handleDragOver=(e,i)=>{e.preventDefault();e.dataTransfer.dropEffect='move';setOverIdx(i);};
  const handleDrop=(e,i)=>{
    e.preventDefault();
    if(dragIdx.current===null||dragIdx.current===i){dragIdx.current=null;setOverIdx(null);return;}
    const next=[...items];const [m]=next.splice(dragIdx.current,1);next.splice(i,0,m);
    onReorder(next);dragIdx.current=null;setOverIdx(null);SFX.click();
  };
  return(
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {items.map((item,i)=>(
        <div key={keyFn?keyFn(item):i}
          draggable
          onDragStart={e=>handleDragStart(i,e)}
          onDragOver={e=>handleDragOver(e,i)}
          onDrop={e=>handleDrop(e,i)}
          onDragEnd={()=>{dragIdx.current=null;setOverIdx(null);}}
          className={`sh-card${overIdx===i&&dragIdx.current!==i?' drag-over':''}`}
          style={{opacity:overIdx!==null&&dragIdx.current===i?.4:1,transition:'opacity .15s'}}>
          {renderItem(item,i)}
        </div>
      ))}
    </div>
  );
};

// ── RANKING UTIL ──────────────────────────────────────────
const computeRanked=(runList,catId)=>{
  const cr=runList.filter(r=>r.catId===catId);const byA={};
  cr.forEach(r=>{const ex=byA[r.athleteId];const rc=r.doneCP?.length||0,ec=ex?.doneCP?.length||0;if(!ex||rc>ec||(rc===ec&&r.finalTime<(ex.finalTime||Infinity)))byA[r.athleteId]=r;});
  return Object.values(byA).sort((a,b)=>{const ac=a.doneCP?.length||0,bc=b.doneCP?.length||0;if(ac!==bc)return bc-ac;return(a.finalTime||Infinity)-(b.finalTime||Infinity);});
};

  const reorderAth=arr=>setAthletes(arr);

    if(!info.name.trim())return;setSaving(true);
    const id=existingId||uid();
    const om={};obstacles.forEach((o,i)=>{om[o.id]={...o,order:i};});
    const am={};athletes.forEach(a=>{am[a.id]=a;});

          <div className="lbl">{t('compName')}</div>

          </div>
          <div className="lbl">{t('mode')}</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {Object.values(MODES).map(m=><button key={m.id} className={`chip${info.mode===m.id?' active':''}`} onClick={()=>{sI('mode',m.id);SFX.hover();}}>{m.name[lang]||m.name.de}</button>)}
          </div>
          {(info.mode==='lives'||info.mode==='segliv')&&(
            <div>
              <div className="lbl" style={{marginBottom:8}}>{t('lives')}: {info.lives}</div>
              <div style={{display:'flex',gap:6}}>{[1,2,3,4,5].map(n=><button key={n} className={`chip${info.lives===n?' active':''}`} style={{flex:1,justifyContent:'center'}} onClick={()=>sI('lives',n)}>{n}❤️</button>)}</div>
            </div>
          )}
          <div className="lbl">{t('numStations')}</div>
          <div style={{display:'flex',gap:6}}>{[1,2,3,4].map(n=><button key={n} className={`chip${info.numStations===n?' active':''}`} style={{flex:1,justifyContent:'center'}} onClick={()=>sI('numStations',n)}>{n}</button>)}</div>
        </div>
      )}

      {step===1&&(
        <div className="section fade-up" style={{flex:1}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

                renderItem={(a,i)=>{const cat=IGN_CATS.find(c=>c.id===a.cat);return(

                    <div className="drag-handle"><I.Drag s={15}/></div>
                    <div style={{fontSize:11,color:'var(--cor)',minWidth:16,fontWeight:700}}>{i+1}</div>
                    <div style={{flex:1,fontSize:13,fontWeight:600}}>{a.name}</div>
                    <div style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>#{a.num}</div>
                    <div style={{fontSize:10,padding:'2px 7px',borderRadius:10,background:`${cat?.color||'#888'}1A`,color:cat?.color||'#888',border:`1px solid ${cat?.color||'#888'}44`,fontWeight:600,whiteSpace:'nowrap'}}>{cat?.name[lang]||'?'}</div>
                    <button style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'flex'}} onClick={()=>setAthletes(a2=>a2.filter(x=>x.id!==a.id))}><I.Trash s={13} c="var(--red)"/></button>
                  </div>

            }

          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:14,display:'flex',flexDirection:'column',gap:8}}>

// JURY — WAIT
// ════════════════════════════════════════════════════════════
const JuryWait=({cat,queue,obstacles,onStart,compId})=>{
  const {t,catName,lang}=useLang();
  const obstArr=obstacles?Object.values(obstacles).sort((a,b)=>a.order-b.order):[];
  const cpObst=obstArr.filter(o=>o.isCP);
  const [localQ,setLocalQ]=useState(null);
  const effectiveQ=localQ||queue;
  const reorderQ=arr=>{
    setLocalQ(arr);
    // persist order to firebase
    const updates={};arr.forEach((a,i)=>{updates[`ogn/${compId}/athletes/${a.id}/queueOrder`]=i;});
    if(Object.keys(updates).length)db.ref().update(updates);
  };
  const next=effectiveQ[0];
  return(
    <div style={{display:'flex',flexDirection:'column',gap:0}}>
      {cat&&<div style={{padding:'14px 16px 0',display:'flex',justifyContent:'center'}}><div className="live-badge"><div className="live-dot"/>{catName(cat)}</div></div>}
      {!next&&<EmptyState icon="✅" text={t('allDone')}/>}
      {next&&(
        <div className="section" style={{gap:10}}>
          {/* Next athlete hero card */}
          <div className="sh-card fade-up" style={{padding:20,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 110%,rgba(255,94,58,.06) 0%,transparent 65%)'}}/>
            <div className="lbl" style={{marginBottom:10}}>{t('nextAthlete')}</div>
            <div style={{fontSize:26,fontWeight:900,letterSpacing:'-.6px',marginBottom:4}}>{next.name}</div>
            <div style={{fontSize:13,color:'var(--muted)',fontFamily:'JetBrains Mono',marginBottom:14}}>#{next.num}</div>
            {/* CP obstacle name pills */}
            <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
              {cpObst.map(o=><div key={o.id} className="cp-pill future">{o.name}</div>)}
            </div>
            <div style={{fontSize:11,color:'var(--muted)'}}>{cpObst.length} Checkpoints · {obstArr.length} Hindernisse</div>
            <button className="btn btn-coral" style={{width:'100%',padding:15,fontSize:16,gap:8,marginTop:16}} onClick={()=>{SFX.click();onStart(next);}}>
              <I.Play s={16}/> {t('startCountdown')}
            </button>
          </div>
          {/* Queue drag-reorder */}
          {effectiveQ.length>1&&(
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div className="lbl">Startreihenfolge</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{t('sortHint')}</div>
              </div>
              <DragList items={effectiveQ.slice(1)} onReorder={arr=>reorderQ([effectiveQ[0],...arr])} keyFn={a=>a.id}
                renderItem={(a,i)=>(
                  <div style={{padding:'9px 12px',display:'flex',alignItems:'center',gap:8}}>
                    <div className="drag-handle"><I.Drag s={15}/></div>
                    <div style={{fontSize:11,color:'var(--cor)',minWidth:16,fontWeight:700}}>{i+2}</div>
                    <div style={{flex:1,fontSize:13,fontWeight:600}}>{a.name}</div>
                    <div style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>#{a.num}</div>
                  </div>
                )}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// JURY — COUNTDOWN
// ════════════════════════════════════════════════════════════
const JuryCountdown=({onGo})=>{
  const {lang}=useLang();
  const [count,setCount]=useState(3);const [go,setGo]=useState(false);
  useEffect(()=>{
    SFX.countdown(()=>{setGo(true);setTimeout(onGo,500);});
    const t1=setTimeout(()=>setCount(2),500),t2=setTimeout(()=>setCount(1),1000),t3=setTimeout(()=>setCount(0),1500);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'65vh',gap:12}}>
      <div className="timer-grad" style={{fontSize:go?88:130,letterSpacing:'-4px',transition:'color .2s',animation:'scaleIn .2s ease'}}>
        {go?'GO!':(count===0?'GO!':count)}
      </div>
      <div style={{fontSize:13,color:'var(--muted)',letterSpacing:'.1em',textTransform:'uppercase'}}>
        {go?(lang==='de'?'Los!':'Go!'):(lang==='de'?'Bereit machen…':'Get ready…')}
      </div>
      {go&&<div className="live-dot" style={{marginTop:4}}/>}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// JURY — ACTIVE RUN
// ════════════════════════════════════════════════════════════
const JuryActive=({compId,stNum,athlete,obstacles,info,lives,onFall,onComplete})=>{
  const {lang}=useLang();
  const obstArr=obstacles?Object.values(obstacles).sort((a,b)=>a.order-b.order):[];
  const cpObst=obstArr.filter(o=>o.isCP);
  const [doneCP,setDoneCP]=useState([]);
  const [startPerf]=useState(()=>performance.now());
  const [startEpoch]=useState(()=>Date.now());
  const el=useTimer(true,startPerf);
  const [flash,setFlash]=useState(false);
  const hasLives=info.mode==='lives'||info.mode==='segliv';

  useEffect(()=>{
    fbSet(`ogn/${compId}/activeRuns/${stNum}`,{athleteId:athlete.id,athleteName:athlete.name,startEpoch,catId:athlete.cat||null,doneCP:[],livesLeft:lives});
    return()=>fbRemove(`ogn/${compId}/activeRuns/${stNum}`);
  },[]);
  useEffect(()=>{if(doneCP.length>0)fbUpdate(`ogn/${compId}/activeRuns/${stNum}`,{doneCP,livesLeft:lives});},[doneCP,lives]);

  const nextIdx=doneCP.length,nextCp=cpObst[nextIdx],allDone=doneCP.length>=cpObst.length;

  const handleCP=()=>{
    if(allDone)return;
    SFX.checkpoint();setFlash(true);setTimeout(()=>setFlash(false),320);
    const nd=[...doneCP,{obsId:nextCp.id,name:nextCp.name,time:Date.now()-startEpoch}];
    setDoneCP(nd);
    if(nd.length>=cpObst.length)setTimeout(()=>onComplete({doneCP:nd,finalTime:performance.now()-startPerf,lives}),400);
  };
  const handleFall=()=>{SFX.fall();onFall({doneCP,time:performance.now()-startPerf,lives});};

  return(
    <div style={{display:'flex',flexDirection:'column',minHeight:'calc(100vh - 56px)',paddingBottom:16}}>
      {/* Athlete card with gradient glow + timer */}
      <div className="sh-card" style={{margin:'12px 16px',padding:'18px 20px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 110%,rgba(255,94,58,.09) 0%,transparent 58%)'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
          <div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:'-.5px'}}>{athlete.name}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:3,fontFamily:'JetBrains Mono'}}>#{athlete.num}</div>
          </div>
          {hasLives&&(
            <div style={{textAlign:'right'}}>
              <div className="lbl" style={{marginBottom:7}}>{lang==='de'?'Leben':'Lives'}</div>
              <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                {Array.from({length:info.lives||3},(_,i)=>(
                  <div key={i} style={{width:11,height:11,borderRadius:'50%',background:i<lives?'var(--cor)':'rgba(255,255,255,.07)',boxShadow:i<lives?'0 0 8px rgba(255,94,58,.6)':'none',transition:'all .3s'}}/>
                ))}
              </div>
            </div>
          )}
        </div>
        <div style={{textAlign:'center'}}>
          <div className="lbl" style={{marginBottom:10}}>{lang==='de'?'Laufzeit':'Run time'}</div>
          <div className="timer-grad" style={{fontSize:54}}>{fmtMs(el)}</div>
          {nextCp&&!allDone&&<div style={{fontSize:12,color:'var(--muted)',marginTop:8}}>{nextCp.name} · CP {nextIdx+1}/{cpObst.length}</div>}
        </div>
      </div>

      {/* CP name pills track */}
      <div style={{padding:'4px 16px 8px'}}>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {cpObst.map((o,i)=>{
            const done=doneCP.some(d=>d.obsId===o.id);const cur=!done&&i===nextIdx;const nxt=!done&&!cur&&i===nextIdx+1;
            return<div key={o.id} className={`cp-pill ${done?'done':cur?'cur':nxt?'next':'future'}`}>{done&&<span style={{fontSize:10,marginRight:3}}>✓</span>}{o.name}</div>;
          })}
        </div>
      </div>

      {/* THE BIG CHECKPOINT BUTTON */}
      {!allDone&&(
        <div style={{padding:'6px 16px',flex:1,display:'flex',flexDirection:'column',gap:8}}>
          <button className={`big-cp-btn${flash?' flash':''}`} style={{flex:1,minHeight:185}} onClick={handleCP}>
            <div style={{fontSize:42}}>🥷</div>
            <div>CHECKPOINT</div>
            {nextCp&&<div style={{fontSize:15,opacity:.82,fontWeight:600,letterSpacing:'.01em'}}>{nextCp.name}</div>}
          </button>
          <button className="btn btn-fall" style={{width:'100%',padding:14,fontSize:13,gap:7}} onClick={handleFall}>
            <I.X s={14}/> {lang==='de'?'Fall melden':'Report fall'}
          </button>
        </div>
      )}

      {allDone&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,padding:'0 16px'}}>
          <div style={{fontSize:52}}>🏁</div>
          <div style={{fontSize:22,fontWeight:900,color:'var(--green)'}}>{lang==='de'?'Ziel erreicht!':'Finish!'}</div>
          <div className="timer-grad" style={{fontSize:38}}>{fmtMs(el)}</div>
          <button className="btn btn-coral" style={{width:'100%',padding:15,fontSize:16,gap:8,marginTop:8}}
            onClick={()=>onComplete({doneCP,finalTime:performance.now()-startPerf,lives})}>
            <I.Flag s={16}/> {lang==='de'?'Bestätigen':'Confirm finish'}
          </button>
        </div>
      )}
    </div>
  );
};

// RESULTS VIEW
// ════════════════════════════════════════════════════════════
const ResultsView=({compId,athletes})=>{
  const {t,lang,catName}=useLang();
  const runs=useFbVal(`ogn/${compId}/completedRuns`);
  const [selCat,setSelCat]=useState(null);
  const runList=runs?Object.values(runs):[];
  const athMap=athletes||{};
  const catsWithRuns=IGN_CATS.filter(c=>runList.some(r=>r.catId===c.id));
  useEffect(()=>{if(!selCat&&catsWithRuns.length>0)setSelCat(catsWithRuns[0].id);},[catsWithRuns.length]);
  const ranked=selCat?computeRanked(runList,selCat):[];
  const medals=['🥇','🥈','🥉'];
  const exportAll=()=>{
    const lines=['OG Ninja Comp · Results',new Date().toLocaleDateString(),''];
    catsWithRuns.forEach(c=>{const r=computeRanked(runList,c.id);if(!r.length)return;lines.push(`\n=== ${catName(c)} ===`);r.forEach((run,i)=>{const a=athMap[run.athleteId]||{name:run.athleteName||'?',num:'?'};lines.push(`${i+1}. #${a.num} ${a.name}  |  ${run.doneCP?.length||0} CPs  |  ${fmtMs(run.finalTime)}`);});});
    const text=lines.join('\n');
    if(navigator.share)navigator.share({title:'OG Ninja Results',text});else if(navigator.clipboard)navigator.clipboard.writeText(text);
    SFX.complete();
  };
  return(
    <div style={{paddingBottom:82}}>
      <div style={{overflowX:'auto',padding:'12px 16px',display:'flex',gap:6,borderBottom:'1px solid var(--border)'}}>
        {catsWithRuns.map(c=>(
          <button key={c.id} className={`chip${selCat===c.id?' active':''}`}
            style={{flexShrink:0,fontSize:11,...(selCat===c.id?{background:`${c.color}1A`,borderColor:`${c.color}55`,color:c.color}:{})}}
            onClick={()=>{setSelCat(c.id);SFX.hover();}}>{c.name[lang]}</button>
        ))}
      </div>
      {catsWithRuns.length===0&&<EmptyState icon="📋" text={t('noRuns')}/>}
      {selCat&&ranked.length>0&&(()=>{
        return(
          <div className="section">
            {ranked[0]&&(()=>{const a=athMap[ranked[0].athleteId]||{name:ranked[0].athleteName||'?',num:'?'};return(
              <div className="winner-card">
                <div style={{fontSize:10,color:'var(--cor)',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:8,fontWeight:600}}>🥇 Platz 1</div>
                <div style={{fontSize:24,fontWeight:800,letterSpacing:'-.5px'}}>{a.name}</div>
                <div className="timer-grad" style={{fontSize:28,marginTop:6}}>{fmtMs(ranked[0].finalTime)}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{ranked[0].doneCP?.length||0} / {ranked[0].totalCPs||'?'} CPs · #{a.num}</div>
              </div>
            );})()} 
            {ranked.slice(1).map((r,i)=>{const a=athMap[r.athleteId]||{name:r.athleteName||'?',num:'?'};return(
              <div key={r.athleteId} className="sh-card fade-up" style={{padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:30,height:30,borderRadius:'50%',flexShrink:0,background:'rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'var(--muted)'}}>{i<2?medals[i+1]:i+2}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{a.name}</div><div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>#{a.num} · {r.doneCP?.length||0} CPs</div></div>
                <div className="timer-grad" style={{fontSize:15}}>{r.finalTime?fmtMs(r.finalTime):t('dnf')}</div>
              </div>
            );})}
            <button className="btn btn-ghost" style={{width:'100%',padding:12,gap:8}} onClick={exportAll}><I.Download s={15}/> {t('export')}</button>
          </div>
        );
      })()}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// JURY APP (tabbed shell)
// ════════════════════════════════════════════════════════════
const JuryApp=({compId,stNum})=>{
  const {t,lang,catName}=useLang();
  const [tab,setTab]=useState('jury');
  const info=useFbVal(`ogn/${compId}/info`);
  const obstacles=useFbVal(`ogn/${compId}/obstacles`);
  const athletesMap=useFbVal(`ogn/${compId}/athletes`);
  const stData=useFbVal(`ogn/${compId}/stations/${stNum}`);
  const completedRuns=useFbVal(`ogn/${compId}/completedRuns`);
  const [phase,setPhase]=useState('wait');
  const [currentAth,setCurrentAth]=useState(null);
  const [fallData,setFallData]=useState(null);
  const [doneResult,setDoneResult]=useState(null);
  const [lives,setLives]=useState(3);
  useEffect(()=>{if(info)setLives(info.lives||3);},[info?.lives]);

  if(!info||obstacles===undefined)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10}}><Spinner/><div style={{fontSize:12,color:'var(--muted)'}}>Station {stNum} · {compId}</div></div>
  );

  const catId=stData?.cat;const cat=IGN_CATS.find(c=>c.id===catId);
  const athList=athletesMap?Object.values(athletesMap):[];
  const doneIds=new Set(completedRuns?Object.values(completedRuns).filter(r=>r.catId===catId).map(r=>r.athleteId):[]);
  const queue=athList.filter(a=>a.cat===catId&&!doneIds.has(a.id)).sort((a,b)=>(a.queueOrder??999)-(b.queueOrder??999));

  const obstArr=obstacles?Object.values(obstacles).sort((a,b)=>a.order-b.order):[];
  const cpObst=obstArr.filter(o=>o.isCP);

  const handleStart=ath=>{setCurrentAth(ath);setLives(info.lives||3);setPhase('countdown');};
  const handleGo=()=>setPhase('active');
  const handleFall=data=>{setFallData(data);setPhase('fall');};
  const handleRetry=()=>{setLives(l=>l-1);setPhase('active');};
  const handleFallConfirm=async()=>{
    const result={athleteId:currentAth.id,athleteName:currentAth.name,catId:currentAth.cat,stNum,mode:info.mode,doneCP:fallData.doneCP||[],totalCPs:cpObst.length,finalTime:fallData.time,lives,status:'fall',timestamp:Date.now()};
    await fbSet(`ogn/${compId}/completedRuns/${uid()}`,result);setDoneResult(result);setPhase('done');SFX.complete();
  };
  const handleComplete=async data=>{
    const result={athleteId:currentAth.id,athleteName:currentAth.name,catId:currentAth.cat,stNum,mode:info.mode,doneCP:data.doneCP||[],totalCPs:cpObst.length,finalTime:data.finalTime,lives:data.lives,status:'complete',timestamp:Date.now()};
    await fbSet(`ogn/${compId}/completedRuns/${uid()}`,result);setDoneResult(result);setPhase('done');
  };
  const handleNext=()=>{setPhase('wait');setCurrentAth(null);setFallData(null);setDoneResult(null);setLives(info.lives||3);};
  const inRun=phase==='active'||phase==='countdown';

  const juryContent=(()=>{
    if(phase==='countdown')return<JuryCountdown onGo={handleGo}/>;
    if(phase==='active')return<JuryActive compId={compId} stNum={stNum} athlete={currentAth} obstacles={obstacles} info={info} lives={lives} onFall={handleFall} onComplete={handleComplete}/>;
    if(phase==='done')return<JuryDone athlete={currentAth} result={doneResult} cat={cat} onNext={handleNext}/>;
    return<JuryWait cat={cat} queue={queue} obstacles={obstacles} onStart={handleStart} compId={compId}/>;
  })();

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <TopBar title={`${t('station')} ${stNum}`} sub={cat?catName(cat):compId}
        right={inRun?<div className="live-badge"><div className="live-dot"/>LIVE</div>:null}/>
      <div style={{flex:1,overflowY:'auto'}}>
        {tab==='jury'&&juryContent}
        {tab==='results'&&!inRun&&<ResultsView compId={compId} athletes={athletesMap}/>}
        {tab==='rules'&&!inRun&&<Regelwerk/>}
      </div>
      {!inRun&&(
        <nav className="tabbar">
          {[{id:'jury',ic:<I.Bolt s={20}/>,lb:t('tabJury')},{id:'results',ic:<I.Trophy s={20}/>,lb:t('tabResults')},{id:'rules',ic:<I.Book s={20}/>,lb:t('tabRules')}].map(tb=>(
            <button key={tb.id} className={`tab-item${tab===tb.id?' active':''}`} onClick={()=>{setTab(tb.id);SFX.hover();}}>{tb.ic}<span>{tb.lb}</span></button>
          ))}
        </nav>
      )}
      {phase==='fall'&&fallData&&(
        <FallModal athlete={currentAth} doneCP={fallData.doneCP} obstacles={obstacles} time={fallData.time} mode={info.mode} lives={lives}
          onConfirm={handleFallConfirm} onRetry={(info.mode==='lives'||info.mode==='segliv')&&lives>1?handleRetry:null} onCancel={()=>setPhase('active')}/>
      )}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// DISPLAY VIEW
// ════════════════════════════════════════════════════════════
const DisplayView=({compId})=>{
  const {lang,catName,t}=useLang();
  const info=useFbVal(`ogn/${compId}/info`);
  const athletesMap=useFbVal(`ogn/${compId}/athletes`);
  const completedRuns=useFbVal(`ogn/${compId}/completedRuns`);
  const activeRuns=useFbVal(`ogn/${compId}/activeRuns`);
  const [catIdx,setCatIdx]=useState(0);const [scrollOff,setScrollOff]=useState(0);const [nowMs,setNowMs]=useState(Date.now());
  const runList=completedRuns?Object.values(completedRuns):[];
  const athMap=athletesMap||{};
  const catsWithData=IGN_CATS.filter(c=>runList.some(r=>r.catId===c.id));
  const activeArr=activeRuns?Object.values(activeRuns).filter(r=>r?.athleteId):[];
  useEffect(()=>{if(catsWithData.length<=1)return;const id=setInterval(()=>{setCatIdx(i=>(i+1)%catsWithData.length);setScrollOff(0);},15000);return()=>clearInterval(id);},[catsWithData.length]);
  useEffect(()=>{const id=setInterval(()=>{setScrollOff(off=>{const cat=catsWithData[catIdx];if(!cat)return 0;const total=computeRanked(runList,cat.id).length-3;return total>0?(off+1)%total:0;});},3000);return()=>clearInterval(id);},[catIdx,catsWithData.length,runList.length]);
  useEffect(()=>{let raf;const tick=()=>{setNowMs(Date.now());raf=requestAnimationFrame(tick);};raf=requestAnimationFrame(tick);return()=>cancelAnimationFrame(raf);},[]);
  const medals=['🥇','🥈','🥉'];const medalColors=['#FFD60A','#C0C0C0','#CD7F32'];
  const curCat=catsWithData[catIdx]||null;const ranked=curCat?computeRanked(runList,curCat.id):[];
  const top3=ranked.slice(0,3);const visRest=ranked.slice(3).slice(scrollOff,scrollOff+4);
  if(!info)return<div style={{background:'#000',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><Spinner/></div>;
  return(
    <div className="display-root">
      <div style={{padding:'18px 24px 14px',borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:16,background:'radial-gradient(ellipse at 50% -40%,rgba(255,94,58,.07) 0%,transparent 60%)'}}>
        <div style={{width:40,height:40,borderRadius:11,background:'linear-gradient(135deg,#FF5E3A,#FF9040)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🥷</div>
        <div style={{flex:1}}><div style={{fontSize:11,color:'rgba(255,255,255,.35)',letterSpacing:'.1em',textTransform:'uppercase'}}>OG Ninja Comp</div><div style={{fontSize:21,fontWeight:900,letterSpacing:'-.5px',marginTop:1}}>{info.name}</div></div>
        <div className="live-badge"><div className="live-dot"/>Live</div>
      </div>
      {activeArr.length>0&&(
        <div style={{background:'rgba(255,94,58,.06)',borderBottom:'1px solid rgba(255,94,58,.14)',padding:'9px 24px',display:'flex',gap:20,overflowX:'auto'}}>
          {activeArr.map((r,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
              <div className="live-dot"/>
              <div style={{fontWeight:700,fontSize:14}}>{r.athleteName||'?'}</div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:15,fontWeight:700,color:'#FF5E3A'}}>{fmtMs(r.startEpoch?nowMs-r.startEpoch:0)}</div>
              {r.doneCP?.length>0&&<div style={{fontSize:11,color:'rgba(255,255,255,.4)'}}>{r.doneCP.length} CPs</div>}
            </div>
          ))}
        </div>
      )}
      {catsWithData.length>1&&(
        <div style={{padding:'14px 24px 0',display:'flex',gap:7,overflowX:'auto'}}>
          {catsWithData.map((c,i)=>(
            <button key={c.id} style={{padding:'5px 14px',borderRadius:20,fontSize:12,fontWeight:700,border:'none',cursor:'pointer',flexShrink:0,background:i===catIdx?c.color:'rgba(255,255,255,.06)',color:i===catIdx?'#fff':'rgba(255,255,255,.4)',transition:'all .4s'}} onClick={()=>{setCatIdx(i);setScrollOff(0);}}>{catName(c)}</button>
          ))}
        </div>
      )}
      {!curCat&&<div style={{padding:'80px 24px',textAlign:'center'}}><div style={{fontSize:52,marginBottom:14}}>🥷</div><div style={{fontSize:18,color:'rgba(255,255,255,.35)'}}>{lang==='de'?'Noch keine Ergebnisse':'No results yet'}</div></div>}
      {curCat&&(
        <div style={{padding:'20px 24px 40px'}}>
          <div style={{marginBottom:18}}><div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 16px',borderRadius:20,background:`${curCat.color}20`,border:`1px solid ${curCat.color}30`}}><div style={{width:8,height:8,borderRadius:'50%',background:curCat.color}}/><span style={{fontSize:14,fontWeight:700,color:curCat.color}}>{catName(curCat)}</span></div></div>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
            {top3.map((r,i)=>{const a=athMap[r.athleteId]||{name:r.athleteName||'?',num:'?'};return(
              <div key={r.athleteId} style={{display:'flex',alignItems:'center',gap:16,padding:'16px 20px',borderRadius:18,background:`linear-gradient(135deg,${curCat.color}18,${curCat.color}06)`,border:`1px solid ${curCat.color}28`,animation:`fadeUp .4s ${i*.1}s both`}}>
                <div style={{fontSize:32,width:44,textAlign:'center'}}>{medals[i]}</div>
                <div style={{flex:1}}><div style={{fontSize:20,fontWeight:800,letterSpacing:'-.3px'}}>{a.name}</div><div style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:2}}>#{a.num} · {r.doneCP?.length||0} CPs</div></div>
                <div style={{fontFamily:'JetBrains Mono',fontSize:22,fontWeight:700,color:medalColors[i]}}>{r.finalTime?fmtMs(r.finalTime):'—'}</div>
              </div>
            );})}
          </div>
          {visRest.length>0&&(
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <div style={{fontSize:10,color:'rgba(255,255,255,.25)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Positionen {scrollOff+4}–{Math.min(scrollOff+7,ranked.length)}</div>
              {visRest.map((r,i)=>{const a=athMap[r.athleteId]||{name:r.athleteName||'?',num:'?'};return(
                <div key={r.athleteId} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderRadius:10,background:'rgba(255,255,255,.04)',animation:'fadeUp .3s both'}}>
                  <div style={{fontSize:13,color:'rgba(255,255,255,.35)',width:26,fontWeight:700,textAlign:'center'}}>{scrollOff+4+i}</div>
                  <div style={{flex:1,fontSize:15,fontWeight:600}}>{a.name}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.35)'}}>{r.doneCP?.length||0} CPs</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:14,color:'rgba(255,255,255,.6)'}}>{r.finalTime?fmtMs(r.finalTime):t('dnf')}</div>
                </div>
              );})}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// DISPLAY — NO COMP SELECTED
// ════════════════════════════════════════════════════════════
const DisplayNoComp=({onSelect})=>{
  const comps=useFbVal('ogn');const list=comps?Object.entries(comps).map(([id,v])=>({id,...v})):[];
  return(
    <div style={{background:'#000',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,padding:24}}>
      <div style={{fontSize:44}}>🥷</div><div style={{fontSize:20,fontWeight:900,color:'#fff'}}>OG Ninja Display</div>
      <div style={{fontSize:13,color:'rgba(255,255,255,.4)',marginBottom:6}}>Wettkampf auswählen</div>
      {list.length===0&&<Spinner/>}
      {list.map(c=>(
        <button key={c.id} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:12,padding:'12px 28px',color:'#fff',cursor:'pointer',fontSize:15,fontWeight:600,width:'100%',maxWidth:340}} onClick={()=>onSelect(c.id)}>
          {c.info?.name||c.id} <span style={{opacity:.5,fontSize:12}}>{c.id}</span>
        </button>
      ))}
    </div>
  );
};

// ════════════════════════════════════════════════════════════
// APP ROUTER
// ════════════════════════════════════════════════════════════
const App=()=>{
  const params=new URLSearchParams(window.location.search);
  const modeP=params.get('mode'),compP=params.get('comp'),stP=params.get('station');
  const [lang,setLang]=useState(()=>storage.get('lang','de'));
  const [compId,setCompId]=useState(compP||null);
  const [view,setView]=useState(()=>{if(modeP==='display')return 'display';if(stP&&compP)return 'jury';if(compP)return 'coordinator';return 'home';});
  useEffect(()=>storage.set('lang',lang),[lang]);
  const stNum=stP?parseInt(stP,10):1;
  const openComp=id=>{setCompId(id);setView('coordinator');};
  return(
    <LangCtx.Provider value={lang}>
      {view==='home'&&<HomeView onOpen={openComp} lang={lang} setLang={setLang}/>}
      {view==='coordinator'&&compId&&<CoordinatorView compId={compId} onBack={()=>{setView('home');setCompId(null);}} lang={lang} setLang={setLang}/>}
      {view==='jury'&&compId&&<JuryApp compId={compId} stNum={stNum}/>}
      {view==='display'&&compId&&<DisplayView compId={compId}/>}
      {view==='display'&&!compId&&<DisplayNoComp onSelect={id=>setCompId(id)}/>}
    </LangCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
